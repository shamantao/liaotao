# Wails build configuration for liaotao.
# Keep this file versioned so first launch works after clone.
version: '3'

info:
  companyName: "shamantao"
  productName: "liaotao"
  productIdentifier: "org.shamantao.liaotao"
  description: "Local-first multi-provider AI chat desktop app"
  copyright: "(c) 2026, shamantao"
  comments: "liaotao desktop"
  version: "0.1.7"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary

fileAssociations:

other:
  - name: Liaotao data
