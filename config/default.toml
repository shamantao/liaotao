# liaotao - Default Configuration
# Template version: 1.0.0
#
# Layer priority (highest wins):
#   default (this file) → user (~/.config/<app>/user.toml) → project (./<app>.toml) → runtime (env/flags)
#
# Do NOT commit user.toml to version control.

# ---------------------------------------------------------------------------
[app]
name       = "liaotao"
version    = "0.1.3"
mode       = "debug"   # debug | normal
language   = "fr"

# ---------------------------------------------------------------------------
[config]
schema_version      = 1
enable_layered_merge = true
# strict_mode = true will make startup fail on any unknown config key.
strict_mode         = false

# ---------------------------------------------------------------------------
[path_manager]
# Restrict ALL write operations to these root directories.
# Any path outside these roots will be rejected at runtime.
# Use $HOME to reference the current user's home directory (portable).
allowed_roots = [
  "$HOME/Downloads",
  "$HOME/.config/liaotao"
]

# Runtime directories — created automatically on first run.
# Override in config/project.toml (dev) or ~/.config/liaotao/user.toml (user).
temp_dir    = "$HOME/.config/liaotao/.tmp"
logs_dir    = "$HOME/.config/liaotao/logs"
reports_dir = "$HOME/.config/liaotao/reports"

# Collision strategy when output file already exists.
# Options: increment | suffix | short_hash
collision_strategy = "increment"

normalize_unicode = false
trim_whitespace   = true

# ---------------------------------------------------------------------------
[database]
path            = "$HOME/.config/liaotao/data/liaotao.db"
busy_timeout_ms = 5000
journal_mode    = "WAL"
foreign_keys    = true

# ---------------------------------------------------------------------------
[logger]
level         = "debug" # trace | debug | info | warn | error — auto-forced to debug for v0.x builds
console_pretty = true
file_json      = true

rotation_enabled = true
max_file_mb      = 20
max_files        = 5

# Attach job_id and correlation_id to every log event.
include_context_ids = true

# ---------------------------------------------------------------------------
[reporting]
enabled           = true
json_report       = true
csv_report        = true
include_failed    = true
