# .gitlab-ci.yml -- GitLab CI/CD pipeline for liaotao.
# Responsibilities: run tests, build cross-platform releases, publish GitLab release on tag.
#
# Trigger: any tag matching vX.Y.Z (semver).
# Stages: test → build → release

workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

stages:
  - test
  - build
  - release

# ─── Variables ────────────────────────────────────────────────────────────────

variables:
  GO_VERSION: "1.25"
  WAILS_VERSION: "v3.0.0-alpha.74"
  ARTIFACT_DIR: "build/artifacts"

# ─── Templates ────────────────────────────────────────────────────────────────

.install_go_wails: &install_go_wails |
  export PATH="$PATH:$HOME/go/bin"
  go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}

# ─── Test ─────────────────────────────────────────────────────────────────────

test:internal:
  stage: test
  image: golang:1.25-bookworm
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config
    - *install_go_wails
  script:
    - go test ./internal/... -v -timeout 60s
  tags:
    - saas-linux-small-amd64

# ─── Build Linux ──────────────────────────────────────────────────────────────

build:linux:
  stage: build
  image: golang:1.25-bookworm
  needs: [test:internal]
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config
    - *install_go_wails
  script:
    - bash ci/build-release.sh
  artifacts:
    name: "liaotao-linux-${CI_COMMIT_TAG}"
    paths:
      - build/artifacts/
    expire_in: 30 days
  tags:
    - saas-linux-small-amd64

# ─── Release ──────────────────────────────────────────────────────────────────
# Note: macOS and Windows builds require GitLab paid runners (saas-macos-medium-m1 /
# shared-windows-amd64). Only the Linux artifact is produced here automatically.
# macOS and Windows builds are done locally and attached to the release manually.

publish:release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build:linux
      artifacts: true
  script:
    - echo "Creating GitLab release for ${CI_COMMIT_TAG}"
  release:
    name: "liaotao ${CI_COMMIT_TAG}"
    tag_name: "$CI_COMMIT_TAG"
    description: |
      ## liaotao ${CI_COMMIT_TAG}

      See [CHANGELOG](https://codeberg.org/shamantao/liaotao/src/branch/main/docs/CHANGELOG.md) for details.

      | Platform | Status |
      |---|---|
      | Linux x64 | Built by CI (see artifact below) |
      | macOS Universal | Manual build — see README |
      | Windows x64 | Manual build — see README |
    assets:
      links:
        - name: "Linux x64 (tar.gz)"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/download?job=build:linux"
          link_type: package
  tags:
    - saas-linux-small-amd64
