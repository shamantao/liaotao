<!-- index.html — Vite entry point for liaotao Svelte frontend. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>liaotao</title>
  <link rel="icon" type="image/svg+xml" href="./assets/logo-liaotao.svg">
  <link rel="stylesheet" href="./prism/prism.css">
  <link rel="stylesheet" href="./katex/katex.min.css">
</head>
<body>
  <div id="app"></div>
  <!-- Vendored libraries loaded as classic scripts (not bundled by Vite) -->
  <script>
    // Loaded at runtime — prism and katex are in public/ and copied to dist/
    const s1 = document.createElement("script"); s1.src = "./prism/prism.js"; document.head.appendChild(s1);
    const s2 = document.createElement("script"); s2.src = "./katex/katex.min.js"; document.head.appendChild(s2);
    const s3 = document.createElement("script"); s3.src = "./katex/auto-render.min.js"; document.head.appendChild(s3);
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
