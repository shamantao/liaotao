<!-- index.html -- Liaotao app shell wiring modular CSS/JS assets. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>liaotao</title>
  <link rel="icon" type="image/svg+xml" href="./assets/logo-liaotao.svg">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/chat.css">
  <link rel="stylesheet" href="./css/settings.css">
  <link rel="stylesheet" href="./prism/prism.css">
  <link rel="stylesheet" href="./katex/katex.min.css">
</head>
<body>
  <div class="app-shell" id="app-shell">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="./assets/logo-liaotao.svg" alt="Liaotao logo">
        <span class="brand-name">liaotao</span>
      </div>
      <nav class="tabs">
        <button class="tab-btn active" data-tab="chat">Chat</button>
        <button class="tab-btn" data-tab="settings">Settings</button>
      </nav>
      <div class="status" id="status">ready</div>
    </header>

    <section id="chat" class="tab-panel active">
      <div class="chat-layout">
        <div class="sidebar-wrap">
          <aside class="sidebar">
            <div class="sidebar-header">
              <h3>Conversations</h3>
              <button class="icon-btn" id="sidebar-toggle" title="Expand or collapse sidebar">☰</button>
            </div>
            <button class="new-chat icon-only-btn" id="new-chat-btn" title="New chat" aria-label="New chat"><span class="new-chat-icon" aria-hidden="true">✚</span></button>
            <input id="conversation-search" class="conversation-search" type="search" placeholder="Search conversations" aria-label="Search conversations">
            <div class="conversation-list" id="conversation-list"></div>
          </aside>
          <div class="sidebar-resizer" id="sidebar-resizer" title="Resize sidebar"></div>
        </div>

        <main class="chat-main">
          <div class="messages" id="messages"></div>
          <div class="composer">
            <div class="composer-main">
              <textarea id="prompt" placeholder="Type message, Enter to send, Shift+Enter for newline"></textarea>
              <div class="composer-actions">
                <button class="send-btn icon-only-btn" id="send-btn" type="button" title="Send" aria-label="Send">
                  <span aria-hidden="true">➤</span>
                </button>
                <button class="stop-btn icon-only-btn" id="stop-btn" type="button" title="Stop generation" aria-label="Stop generation">
                  <span aria-hidden="true">■</span>
                </button>
              </div>
            </div>
            <div class="chat-toolbar">
              <label for="chat-provider">Provider</label>
              <select id="chat-provider">
                <!-- Populated dynamically from providers DB -->
              </select>
              <label for="chat-model">Model</label>
              <input id="chat-model-filter" type="search" placeholder="Filter models" aria-label="Filter models">
              <select id="chat-model">
                <option value="gpt-4o-mini">gpt-4o-mini</option>
                <option value="gpt-4.1-mini">gpt-4.1-mini</option>
                <option value="mistral-small">mistral-small</option>
                <option value="llama3.2">llama3.2</option>
              </select>
              <label for="chat-temperature">Temp</label>
              <input id="chat-temperature" type="number" min="0" max="2" step="0.1" value="0.7">
              <label for="chat-max-tokens">Max tokens</label>
              <input id="chat-max-tokens" type="number" min="0" max="131072" step="1" value="0">
              <input id="chat-system-prompt" type="text" placeholder="System prompt for this conversation" aria-label="System prompt for this conversation">
              <button class="action-btn icon-only-btn" id="refresh-models-btn" type="button" title="Refresh models" aria-label="Refresh models">
                <span aria-hidden="true">↻</span>
              </button>
            </div>
            <div class="last-used-models" id="last-used-models"></div>
          </div>
        </main>
      </div>
    </section>

    <section id="settings" class="tab-panel settings-panel">
      <div class="settings-layout">
        <nav class="settings-nav">
          <button class="settings-nav-btn active" data-section="general">General</button>
          <button class="settings-nav-btn" data-section="providers">Providers</button>
          <button class="settings-nav-btn" data-section="mcp">MCP Servers</button>
          <button class="settings-nav-btn" data-section="about">About</button>
        </nav>
        <div class="settings-content">

          <!-- ── General ──────────────────────────────────── -->
          <div class="settings-section active" id="section-general">
            <h3>General</h3>
            <div class="field-group">
              <label for="language">Language</label>
              <select id="language">
                <option value="fr">French</option>
                <option value="en">English</option>
              </select>
            </div>
            <div class="field-group">
              <label for="theme">Theme</label>
              <select id="theme">
                <option value="dark">Dark</option>
              </select>
            </div>
            <div class="field-group">
              <label>Response footer</label>
              <label class="checkbox-row" for="show-meta-footer">
                <input type="checkbox" id="show-meta-footer"> Show model &amp; token info after each response
              </label>
            </div>
            <div class="field-group">
              <label for="default-system-prompt">Default system prompt</label>
              <textarea id="default-system-prompt" rows="3" placeholder="Used for new conversations"></textarea>
            </div>
            <div class="field-group">
              <label>Configuration</label>
              <div class="test-connection-row">
                <button type="button" class="action-btn" id="export-config-btn">Export TOML</button>
                <label class="action-btn" for="import-config-input">Import TOML</label>
                <input id="import-config-input" type="file" accept=".toml,text/plain" class="hidden">
              </div>
            </div>
          </div>

          <!-- ── Providers ────────────────────────────────── -->
          <div class="settings-section" id="section-providers">
            <div class="providers-layout">
              <aside class="providers-list-panel">
                <div class="providers-list-header">
                  <h4>Providers</h4>
                  <button class="icon-btn" id="new-provider-btn" title="Add provider">＋</button>
                </div>
                <div class="providers-list" id="providers-list"></div>
              </aside>
              <div class="provider-form-panel">
                <p class="provider-form-placeholder">Select a provider or click ＋ to add one.</p>
                <form class="provider-form hidden" id="provider-form" autocomplete="off">
                  <input type="hidden" id="pf-id">

                  <!-- PROV-08: Pre-configured profile selector -->
                  <div class="field-group">
                    <label for="pf-preset">Load preset</label>
                    <div class="preset-row">
                      <select id="pf-preset">
                        <option value="">— Custom / Local —</option>
                        <!-- Populated dynamically via ListProviderProfiles -->
                      </select>
                      <a id="pf-docs-link" href="#" target="_blank" rel="noreferrer" class="docs-link hidden">Get API key ↗</a>
                    </div>
                  </div>

                  <div class="field-group">
                    <label for="pf-name">Name *</label>
                    <input id="pf-name" placeholder="My Ollama" required>
                  </div>
                  <div class="field-group">
                    <label for="pf-type">Provider type</label>
                    <select id="pf-type">
                      <option value="openai-compatible">OpenAI-compatible</option>
                      <option value="ollama">Ollama</option>
                      <option value="gemini">Gemini</option>
                      <option value="anthropic">Anthropic</option>
                      <option value="mistral">Mistral</option>
                    </select>
                  </div>
                  <div class="field-group">
                    <label for="pf-url">Base URL</label>
                    <input id="pf-url" placeholder="http://localhost:11434/v1">
                  </div>
                  <div class="field-group">
                    <label for="pf-key">API Key (optional)</label>
                    <input id="pf-key" type="password" placeholder="sk-...">
                  </div>
                  <div class="field-group">
                    <label for="pf-description">Description</label>
                    <textarea id="pf-description" rows="2" placeholder="What this provider is for..."></textarea>
                  </div>
                  <div class="field-row">
                    <label class="check-label"><input type="checkbox" id="pf-rag"> Use in RAG</label>
                    <label class="check-label"><input type="checkbox" id="pf-active" checked> Active</label>
                  </div>
                  <div class="field-group">
                    <label for="pf-temperature">Temperature</label>
                    <input id="pf-temperature" type="number" min="0" max="2" step="0.1" value="0.7">
                  </div>
                  <div class="field-group">
                    <label for="pf-num-ctx">Context window (num_ctx)</label>
                    <input id="pf-num-ctx" type="number" min="128" max="131072" step="128" value="1024">
                  </div>

                  <!-- PROV-05: Test connection row -->
                  <div class="test-connection-row">
                    <button type="button" class="action-btn secondary icon-only-btn" id="pf-test-btn" title="Test connection" aria-label="Test connection">⚡</button>
                    <span id="pf-test-result" class="test-result"></span>
                  </div>

                  <div class="provider-form-actions">
                    <button type="button" class="danger-btn icon-only-btn hidden" id="pf-delete-btn" title="Delete provider" aria-label="Delete provider">🗑</button>
                    <button type="submit" class="action-btn icon-only-btn" title="Save provider" aria-label="Save provider">✓</button>
                  </div>
                </form>
              </div>
            </div>
          </div>

          <!-- ── MCP Servers ──────────────────────────────── -->
          <div class="settings-section" id="section-mcp">
            <div class="providers-layout">
              <aside class="providers-list-panel">
                <div class="providers-list-header">
                  <h4>MCP Servers</h4>
                  <button class="icon-btn" id="new-mcp-btn" title="Add MCP server">＋</button>
                </div>
                <div class="providers-list" id="mcp-servers-list"></div>
              </aside>
              <div class="provider-form-panel">
                <p class="provider-form-placeholder" id="mcp-form-placeholder">Select a server or click ＋ to add one.</p>
                <form class="provider-form hidden" id="mcp-server-form" autocomplete="off">
                  <input type="hidden" id="msf-id">
                  <div class="field-group">
                    <label for="msf-name">Name *</label>
                    <input id="msf-name" placeholder="aitao local" required>
                  </div>
                  <div class="field-group">
                    <label for="msf-transport">Transport *</label>
                    <select id="msf-transport">
                      <option value="http">HTTP (Streamable HTTP / MCP 1.0) — URL: http://host/mcp</option>
                      <option value="sse">SSE (legacy FastMCP / aitao) — URL: http://host:port</option>
                      <option value="stdio">stdio (spawn process)</option>
                    </select>
                  </div>
                  <div class="field-group" id="msf-url-group">
                    <label for="msf-url">URL</label>
                    <input id="msf-url" placeholder="http://localhost:8201">
                  </div>
                  <div class="field-group hidden" id="msf-cmd-group">
                    <label for="msf-command">Command</label>
                    <input id="msf-command" placeholder="aitao">
                  </div>
                  <div class="field-group hidden" id="msf-args-group">
                    <label for="msf-args">Args (JSON array)</label>
                    <input id="msf-args" placeholder='["mcp", "stdio"]'>
                  </div>
                  <div class="field-group">
                    <label class="checkbox-row" for="msf-active">
                      <input type="checkbox" id="msf-active" checked> Active
                    </label>
                  </div>
                  <div class="field-group test-connection-row">
                    <button type="button" class="action-btn secondary icon-only-btn" id="msf-ping-btn" title="Test connection" aria-label="Test connection">⚡</button>
                    <button type="button" class="action-btn secondary icon-only-btn" id="msf-copy-btn" title="Copy config" aria-label="Copy config">⧉</button>
                    <span id="msf-ping-status" class="test-result"></span>
                  </div>
                  <div id="msf-tools-list" class="tools-list hidden"></div>
                  <div class="provider-form-actions">
                    <button type="button" class="danger-btn icon-only-btn hidden" id="msf-delete-btn" title="Delete MCP server" aria-label="Delete MCP server">🗑</button>
                    <button type="submit" class="action-btn icon-only-btn" title="Save MCP server" aria-label="Save MCP server">✓</button>
                  </div>
                  <p id="msf-status" class="form-status-msg"></p>
                </form>
              </div>
            </div>
          </div>

          <div class="settings-section" id="section-about">
            <h3>About</h3>
            <div id="about-content" class="about-content"></div>
          </div>
      </div>
    </section>
  </div>

  <script src="./prism/prism.js"></script>
  <script src="./katex/katex.min.js"></script>
  <script src="./katex/auto-render.min.js"></script>
  <script type="module" src="/wails/runtime.js"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
