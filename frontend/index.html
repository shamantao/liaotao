<!-- index.html -- Liaotao app shell wiring modular CSS/JS assets. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>liaotao</title>
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/chat.css">
  <link rel="stylesheet" href="./css/settings.css">
  <link rel="stylesheet" href="./prism/prism.css">
  <link rel="stylesheet" href="./katex/katex.min.css">
</head>
<body>
  <div class="app-shell" id="app-shell">
    <header class="topbar">
      <div class="brand">liaotao</div>
      <nav class="tabs">
        <button class="tab-btn active" data-tab="chat">Chat</button>
        <button class="tab-btn" data-tab="settings">Settings</button>
      </nav>
      <div class="status" id="status">ready</div>
    </header>

    <section id="chat" class="tab-panel active">
      <div class="chat-layout">
        <div class="sidebar-wrap">
          <aside class="sidebar">
            <div class="sidebar-header">
              <h3>Conversations</h3>
              <button class="icon-btn" id="sidebar-toggle" title="Expand or collapse sidebar">☰</button>
            </div>
            <button class="new-chat" id="new-chat-btn"><span class="new-chat-icon">＋</span> <span class="new-chat-label">New chat</span></button>
            <div class="conversation-list" id="conversation-list"></div>
          </aside>
          <div class="sidebar-resizer" id="sidebar-resizer" title="Resize sidebar"></div>
        </div>

        <main class="chat-main">
          <div class="chat-toolbar">
            <label for="chat-model">Model</label>
            <select id="chat-model">
              <option value="gpt-4o-mini">gpt-4o-mini</option>
              <option value="gpt-4.1-mini">gpt-4.1-mini</option>
              <option value="mistral-small">mistral-small</option>
              <option value="llama3.2">llama3.2</option>
            </select>
          </div>
          <div class="messages" id="messages"></div>
          <div class="composer">
            <textarea id="prompt" placeholder="Type message, Enter to send, Shift+Enter for newline"></textarea>
            <button class="send-btn" id="send-btn">Send</button>
            <button class="stop-btn" id="stop-btn">Stop</button>
          </div>
        </main>
      </div>
    </section>

    <section id="settings" class="tab-panel settings-panel">
      <div class="settings-grid">
        <article class="card">
          <h4>General</h4>
          <label for="language">Language</label>
          <select id="language"><option value="fr">French</option><option value="en">English</option></select>
          <label for="theme">Theme</label>
          <select id="theme"><option>Dark</option></select>
        </article>
        <article class="card">
          <h4>Provider</h4>
          <label for="provider-url">Base URL</label>
          <input id="provider-url" placeholder="https://api.openai.com/v1">
          <label for="provider-key">API Key</label>
          <input id="provider-key" placeholder="sk-...">
        </article>
        <article class="card">
          <h4>Runtime</h4>
          <label for="temperature">Temperature</label>
          <input id="temperature" type="number" min="0" max="2" step="0.1" value="0.7">
          <label for="max-tokens">Max tokens</label>
          <input id="max-tokens" type="number" min="16" max="8192" step="16" value="1024">
        </article>
      </div>
    </section>
  </div>

  <script src="./prism/prism.js"></script>
  <script src="./katex/katex.min.js"></script>
  <script src="./katex/auto-render.min.js"></script>
  <script src="/wails/runtime.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
