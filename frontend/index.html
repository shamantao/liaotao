<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>liaotao</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1E1E1E;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    main {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }
    h1 { margin-bottom: 1rem; font-size: 2rem; }
    p { color: #B0B0B0; margin-bottom: 1.5rem; }
    button {
      background: #0D8BF0;
      color: #fff;
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #0A6FC2; }
    #status { margin-top: 1rem; font-family: monospace; color: #4EC9B0; }
  </style>
</head>
<body>
  <main>
    <h1>liaotao</h1>
    <p>Wails + Go application — ready to build.</p>
    <button onclick="healthcheck()">Healthcheck</button>
    <div id="status"></div>
  </main>

  <script>
    async function healthcheck() {
      const el = document.getElementById('status');
      try {
        // Wails bindings will be generated in wailsjs/
        el.textContent = '✓ Frontend loaded — connect Go backend bindings next.';
      } catch (e) {
        el.textContent = '✗ Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
