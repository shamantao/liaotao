# release-build.yml -- Cross-platform build and packaging workflow for liaotao.
# Responsibilities: run tests, build release artifacts on macOS/Windows/Linux, and auto-version from tags.

name: build-and-release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  test-internal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run internal tests
        run: go test ./internal/... -v -timeout 60s

  build:
    needs: test-internal
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            label: macos-intel
          - os: macos-14
            label: macos-apple-silicon
          - os: macos-14
            label: macos-universal
            universal: "1"
          - os: ubuntu-22.04
            label: linux-x64
          - os: windows-2022
            label: windows-x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Build artifacts
        shell: bash
        env:
          BUILD_UNIVERSAL: ${{ matrix.universal || '0' }}
        run: bash ci/build-release.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liaotao-${{ matrix.label }}
          path: build/artifacts/*
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "liaotao ${{ github.ref_name }}"
          body: |
            ## liaotao ${{ github.ref_name }}

            Cross-platform release built by GitHub Actions.

            | Platform | Artifact |
            |---|---|
            | macOS Intel | `liaotao-*-darwin-x86_64.zip` |
            | macOS Apple Silicon | `liaotao-*-darwin-arm64.zip` |
            | macOS Universal | `liaotao-*-darwin-universal.zip` |
            | Linux x64 | `liaotao-*-linux-x86_64.tar.gz` |
            | Windows x64 | `liaotao-*-windows-x86_64.zip` or `.exe` |

            See [CHANGELOG](https://github.com/shamantao/liaotao/blob/main/docs/CHANGELOG.md) for details.
          files: dist/**/*
          fail_on_unmatched_files: false
